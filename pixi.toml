[project]
authors = ["timoverlaan <t.verlaan@tudelft.nl>"]
channels = ["conda-forge"]
description = "Reproducible environment for processing the ROSMAP dataset"
name = "rosmap-processing"
platforms = ["win-64", "linux-64"]
version = "0.1.3"

[system-requirements]
linux = "3.10"  # Lower for older kernel on DAIC
# cuda = "12.4"  # (not necessary for processing)

[tasks]
setup-dev = "pip install -e ."
process = { cmd = "python -m screni.data.loading", env = { PYTHONPATH = "src" } }
integrate-pbmc = { cmd = "python -m screni.data.integration", env = { PYTHONPATH = "src" } }
integrate-retinal = { cmd = "python -m screni.data.integration_retinal", env = { PYTHONPATH = "src" } }
feature-select = { cmd = "python -m screni.data.feature_selection", env = { PYTHONPATH = "src" } }
load-seaad = { cmd = "python -m screni.data.loading_seaad", env = { PYTHONPATH = "src" } }
integrate-seaad = { cmd = "python -m screni.data.integration_seaad", env = { PYTHONPATH = "src" } }
gene-peak = { cmd = "python -m screni.data.gene_peak_relations", env = { PYTHONPATH = "src" } }

[dependencies]
ipykernel = "*"
psutil = ">=5.9.8,<5.10.dev0"
pandas = ">=2.2.3,<3"

anndata = ">=0.11.4,<0.12"
seaborn = ">=0.13.2,<0.14"
scanpy = ">=1.11.2,<2"
python-igraph = ">=0.11.8,<0.12"
leidenalg = ">=0.10.2,<0.11"
openpyxl = ">=3.1.5,<4"
pyyaml = ">=6.0,<7"
scikit-learn = ">=1.3.0"

[pypi-dependencies]
synapseclient = ">=4.7.0"
awscli = ">=1.40.33, <2"
pytest = ">=7.0"
pytest-cov = ">=4.0"
muon = ">=0.1.6"
harmonypy = ">=0.0.9"
celltypist = ">=1.6.0"
rdata = ">=0.11"                    # Read R .rds files (TRANSFAC PWMs)

[target.linux-64.dependencies]
scikit-misc = ">=0.1.4,<0.2"

[target.win-64.pypi-dependencies]
scikit-misc = ">=0.1.4"       # conda build broken on Windows, pip works
pyfaidx = ">=0.7.0"           # Pure Python, works on Windows too

[target.linux-64.pypi-dependencies]
pyfaidx = ">=0.7.0"           # Genome FASTA indexing (pure Python, pip only)
MOODS-python = ">=1.9.4"      # Exact motif p-value matching (C extension, Linux only)
